services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense_api_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=expense_db
      - DB_USERNAME=expense_user
      - DB_PASSWORD=expense_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    depends_on:
      - db
      - redis
    networks:
      - expense_network

  nginx:
    image: nginx:alpine
    container_name: expense_api_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - expense_network

  db:
    image: mysql:8.0
    container_name: expense_api_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: expense_db
      MYSQL_USER: expense_user
      MYSQL_PASSWORD: expense_password
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - expense_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: expense_api_redis
    ports:
      - "6379:6379"
    networks:
      - expense_network

volumes:
  dbdata:

networks:
  expense_network:
    driver: bridge
